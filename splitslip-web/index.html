<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SplitSlip — itemized bill splitter</title>
<meta name="description" content="Split itemized bills fairly, track who paid, and settle up." />
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">SplitSlip<span class="logo-dot">.</span></h1>
      <nav class="tabs" role="tablist">
        <button class="tab is-active" data-tab="bill" role="tab" aria-selected="true">Bill</button>
        <button class="tab" data-tab="ledger" role="tab" aria-selected="false">Ledger</button>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- BILL TAB -->
    <section id="panel-bill" class="panel is-active">

      <div class="field-group">
        <label class="field-label">People</label>
        <div id="people-row" class="chip-row"></div>
      </div>

      <div class="card">
        <input id="bill-title" class="input input-title" placeholder="Bill title — e.g. Saturday dinner" />

        <div class="item-input-row">
          <input id="item-name" class="input" placeholder="Item name" />
          <input id="item-price" class="input input-price" type="number" min="0" step="1" placeholder="₹0" />
        </div>

        <div id="assign-row" class="chip-row"></div>

        <button id="add-item" class="btn btn-outline">
          <span aria-hidden="true">+</span> Add item
        </button>
      </div>

      <div id="items-list" class="items-list"></div>

      <div class="card card-settings">
        <div class="setting">
          <label class="field-label" for="gst-rate">GST rate</label>
          <div class="input-suffix-group">
            <input id="gst-rate" class="input input-small" type="number" min="0" step="0.5" value="5" />
            <span class="input-suffix">%</span>
          </div>
        </div>
        <div class="setting">
          <label class="field-label">Split tax</label>
          <div class="segmented" id="split-mode">
            <button class="segmented-btn is-active" data-value="proportional">By share</button>
            <button class="segmented-btn" data-value="equal">Equally</button>
          </div>
        </div>
        <div class="setting">
          <label class="field-label">Who paid</label>
          <div id="paid-by" class="chip-row chip-row-select"></div>
        </div>
      </div>

      <div id="receipts" class="receipt-grid"></div>

      <button id="save-bill" class="btn btn-primary btn-full">Save bill to ledger</button>
    </section>

    <!-- LEDGER TAB -->
    <section id="panel-ledger" class="panel">
      <div class="card">
        <h2 class="section-title">Net balances</h2>
        <div id="net-balances"></div>
      </div>

      <h2 class="section-title">Bill history</h2>
      <div id="bill-history"></div>
    </section>

  </main>

  <footer class="footer">
    <span>Data stays on this device — nothing is sent anywhere.</span>
    <button id="reset-data" class="link-btn">Reset all data</button>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
